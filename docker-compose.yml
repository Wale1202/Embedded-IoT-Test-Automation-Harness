# Spins up PostgreSQL for local development and CI.
# Usage: docker compose up -d
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
      POSTGRES_DB: harness
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness"]
      interval: 5s
      timeout: 5s
      retries: 5
